<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | The Right Words</title>
  <meta name="description" content="Contact The Right Words." />
  <link rel="icon" href="../static/images/favicon.ico" />
  <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body>
  <header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="site-logo-link">
      <img src="../static/images/contact.png" alt="Contact" class="site-logo">
    </a>

    <button
      class="menu-toggle"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="mobile-nav"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" id="site-nav">
      <a href="../index.html" class="">Home</a>
      <a href="../services/index.html" class="">Services</a>
      <a href="../projects/index.html" class="">Projects</a>
      <a href="../about/index.html" class="">About</a>
      <a href="#" class="is-hidden"></a>
    </nav>

    <nav class="mobile-nav" id="mobile-nav">
      <a href="../index.html">Home</a>
      <a href="../services/index.html">Services</a>
      <a href="../projects/index.html">Projects</a>
      <div class="mobile-subnav">
        <a href="../projects/not-famous-last-words/index.html">Not <em>Famous</em> Last Words</a>
        <a href="../projects/haiku-working-title/index.html">Haiku</a>
        <a href="../projects/fragments/index.html">Fragments</a>
      </div>
      <a href="../about/index.html">About</a>
      <a href="../contact/index.html">Contact</a>
    </nav>
  </div>
</header>

  <main class="site-main">
    <section class="page-section">
  <div class="container contact-layout">

    <p class="contact-intro">
      If you have a commission or project you would like to discuss, please complete the form below
    </p>

    <p class="contact-email">
      <em>or</em> email me at tiffany@tiffanywedwards.com.
    </p>

    <form
      class="contact-form"
      id="contact-form"
      method="POST"
      action="https://formspree.io/f/xbdpdaej"
    >
      <input type="hidden" name="_subject" value="New enquiry — Tiffany W Edwards">
      <input type="text" name="_gotcha" style="display:none">

      <div class="form-row two">
        <div class="form-field">
          <label>First Name [required]</label>
          <input type="text" name="first_name" required>
        </div>

        <div class="form-field">
          <label>Last Name [required]</label>
          <input type="text" name="last_name" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Email [required]</label>
          <input type="email" name="email" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Please describe your commission or project [required]</label>
          <textarea name="message" rows="7" required></textarea>
        </div>
      </div>

      <div class="form-row">
        <button type="submit" class="form-submit">Submit</button>
      </div>

      <p class="form-status" id="form-status"></p>
    </form>

  </div>
</section>
  </main>

  <footer class="site-footer">
  <div class="container">
    <p>&copy; 2026 Tiffany W Edwards. All rights reserved.</p>
  </div>
</footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("contact-form");
      const status = document.getElementById("form-status");

      if (!form || !status) return;

      form.addEventListener("submit", async function (event) {
        event.preventDefault();

        status.textContent = "Sending...";

        const data = new FormData(form);

        try {
          const response = await fetch(form.action, {
            method: "POST",
            body: data,
            headers: {
              "Accept": "application/json"
            }
          });

          if (response.ok) {
            form.reset();
            status.textContent = "Thank you. Your message has been sent.";
          } else {
            status.textContent = "Something went wrong. Please try again.";
          }
        } catch (error) {
          status.textContent = "Something went wrong. Please try again.";
        }
      });
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toggle = document.querySelector(".menu-toggle");
      const nav = document.querySelector(".mobile-nav");

      if (!toggle || !nav) return;

      toggle.addEventListener("click", function () {
        const isOpen = nav.classList.toggle("is-open");
        toggle.classList.toggle("is-open", isOpen);
        toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      document.addEventListener("click", function (e) {
        if (!nav.contains(e.target) && !toggle.contains(e.target)) {
          nav.classList.remove("is-open");
          toggle.classList.remove("is-open");
          toggle.setAttribute("aria-expanded", "false");
        }
      });
    });
  </script>
</body>
</html>
